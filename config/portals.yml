# WebSearch queries for broad discovery (Level 3)
search_queries:
  - query: 'site:jobs.ashbyhq.com "strategy" OR "operations" OR "consulting"'
    name: "Ashby - Strategy"
    enabled: true

  - query: 'site:jobs.lever.co "business transformation" OR "strategy analyst"'
    name: "Lever - BizTransform"
    enabled: true

  - query: 'site:boards.greenhouse.io "AI" "strategy" "operations"'
    name: "Greenhouse - AI Strategy"
    enabled: true

  - query: 'site:jobs.ashbyhq.com "product manager" "AI" OR "ML"'
    name: "Ashby - AI PM"
    enabled: true

  - query: 'site:jobs.lever.co "solutions architect" OR "forward deployed"'
    name: "Lever - SA/FDE"
    enabled: true
