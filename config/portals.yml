# AutoApply Portal Scanner Configuration
# Multi-level discovery: Greenhouse API, Ashby, Lever, and direct career pages

# Title filters for relevance
title_filter:
  positive:
    - strategy
    - operations
    - analyst
    - consulting
    - consultant
    - transformation
    - business
    - product
    - data
    - intelligence
    - ai
    - manager
    - solutions
    - architect
  negative:
    - senior director
    - vp
    - vice president
    - intern
    - junior
    - principal
    - staff engineer
    - devops
    - sre
    - nurse
    - physician
    - legal counsel
  seniority_boost:
    - senior
    - lead
    - staff
    - principal

# Tracked companies with Greenhouse API access
tracked_companies:
